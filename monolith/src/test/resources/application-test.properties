spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Keep test logs concise while preserving failures and warnings.
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# Test-only secret to satisfy JWT configuration.
jwt.secret=test-jwt-secret-key-256-bit-minimum-change-me

