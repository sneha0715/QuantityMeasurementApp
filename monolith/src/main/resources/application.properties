spring.application.name=quantity-measurement-app
spring.config.import=optional:file:.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# SWAGGER
springdoc.swagger-ui.path=/swagger-ui.html

# ACTUATOR (BASE DEFAULTS)
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

#JPA
spring.jpa.open-in-view=false

# SECURITY
jwt.secret=${JWT_SECRET:xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173}

# LOGGING
logging.level.root=INFO

