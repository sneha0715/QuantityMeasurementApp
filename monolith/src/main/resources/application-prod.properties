# DATASOURCE - Prefer DB_URL (Railway / Cloud), fallback for local/dev
spring.datasource.url=${DB_URL:jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${MYSQL_DATABASE:quantitymeasurement}?useSSL=true&requireSSL=true&serverTimezone=UTC}
spring.datasource.hikari.data-source-properties.sslMode=REQUIRED
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:sneha}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HIKARI CONNECTION POOL
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:15}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:1800000}
spring.datasource.hikari.leak-detection-threshold=2000

# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Performance tuning
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# JACKSON
spring.jackson.serialization.write-dates-as-timestamps=false

# SECURITY (JWT)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# GOOGLE OAUTH
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI}
spring.security.oauth2.client.registration.google.scope=profile,email

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# SERVER
# Railway uses PORT automatically
server.port=${PORT:${SERVER_PORT:8080}}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
server.forward-headers-strategy=framework

# COMPRESSION
server.compression.enabled=true
server.compression.min-response-size=2KB
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript

# ACTUATOR / HEALTH
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# LOGGING (CLEAN & SAFE)
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF

# ERROR HANDLING (SECURE)
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
