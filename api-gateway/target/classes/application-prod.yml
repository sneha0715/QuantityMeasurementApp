# API Gateway Production Configuration
# Uses service discovery with Eureka and cloud infrastructure

server:
  forward-headers-strategy: framework
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
  # Production Redis
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

# Eureka Client Configuration - Production
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE}
    register-with-eureka: true
    fetch-registry: true
    instance-info-replication-interval-seconds: 30
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# Service Configuration
app:
  services:
    quantity:
      name: ${QUANTITY_SERVICE_NAME:quantity-service}
    auth:
      name: ${AUTH_SERVICE_NAME:auth-service}
  gateway:
    retry:
      retries: ${GATEWAY_RETRY_RETRIES:3}
    ratelimit:
      auth:
        replenish-rate: ${GATEWAY_AUTH_RATE_PER_SEC:50}
        burst-capacity: ${GATEWAY_AUTH_BURST_CAPACITY:100}
      quantity:
        replenish-rate: ${GATEWAY_QUANTITY_RATE_PER_SEC:100}
        burst-capacity: ${GATEWAY_QUANTITY_BURST_CAPACITY:200}

# Logging Configuration - Minimal for production
logging:
  level:
    root: WARN
    org.springframework.cloud.gateway: INFO
    com.app.apigateway: INFO
  file:
    name: logs/api-gateway.log
    max-size: 10MB
    max-history: 10
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Management Endpoints - Limited for security
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
