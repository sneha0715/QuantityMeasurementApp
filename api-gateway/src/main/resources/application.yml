spring:
  application:
    name: api-gateway
  config:
    import: "optional:file:.env[.properties]"
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  cloud:
    gateway:
      # Global filters and settings
      default-filters:
        - name: AddRequestHeader
          args:
            name: X-Gateway-Request-Id
            value: "${GATEWAY_REQUEST_ID_HEADER:api-gateway}"

      # Route definitions
      routes:
        # ===== AUTHENTICATION SERVICE ROUTES =====
        - id: auth-register
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/register
            - Method=POST
          filters:
            - name: Retry
              args:
                retries: ${app.gateway.retry.retries}
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
                methods: POST
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth
            - name: RequestRateLimiter
              args:
                "redis-rate-limiter.replenishRate": ${app.gateway.ratelimit.auth.replenish-rate}
                "redis-rate-limiter.burstCapacity": ${app.gateway.ratelimit.auth.burst-capacity}
                key-resolver: "#{@userKeyResolver}"
            - AddRequestHeader=X-Auth-Type,registration

        - id: auth-login
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/login
            - Method=POST
          filters:
            - name: Retry
              args:
                retries: ${app.gateway.retry.retries}
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
                methods: POST
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth
            - name: RequestRateLimiter
              args:
                "redis-rate-limiter.replenishRate": ${app.gateway.ratelimit.auth.replenish-rate}
                "redis-rate-limiter.burstCapacity": ${app.gateway.ratelimit.auth.burst-capacity}
                key-resolver: "#{@userKeyResolver}"
            - AddRequestHeader=X-Auth-Type,login

        - id: auth-logout
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/logout
            - Method=POST
          filters:
            - name: Retry
              args:
                retries: ${app.gateway.retry.retries}
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
                methods: POST
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth
            - AddRequestHeader=X-Auth-Type,logout

        - id: auth-oauth2
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/oauth2/**
            - Method=POST
          filters:
            - name: Retry
              args:
                retries: ${app.gateway.retry.retries}
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
                methods: POST
            - name: CircuitBreaker
              args:
                name: authCircuitBreaker
                fallbackUri: forward:/fallback/auth
            - name: RequestRateLimiter
              args:
                "redis-rate-limiter.replenishRate": ${app.gateway.ratelimit.auth.replenish-rate}
                "redis-rate-limiter.burstCapacity": ${app.gateway.ratelimit.auth.burst-capacity}
                key-resolver: "#{@userKeyResolver}"
            - AddRequestHeader=X-Auth-Type,oauth2

        # ===== QUANTITY SERVICE ROUTES (Authenticated) =====
        - id: quantity-route
          uri: ${QUANTITY_SERVICE_URI:lb://quantity-service}
          predicates:
            - Path=/api/v1/quantities/**
          filters:
            - name: Retry
              args:
                retries: ${app.gateway.retry.retries}
                statuses: BAD_GATEWAY,SERVICE_UNAVAILABLE,GATEWAY_TIMEOUT,INTERNAL_SERVER_ERROR
                methods: GET,POST,PUT,DELETE
            - name: CircuitBreaker
              args:
                name: quantityCircuitBreaker
                fallbackUri: forward:/fallback/quantity
            - name: RequestRateLimiter
              args:
                "redis-rate-limiter.replenishRate": ${app.gateway.ratelimit.quantity.replenish-rate}
                "redis-rate-limiter.burstCapacity": ${app.gateway.ratelimit.quantity.burst-capacity}
                key-resolver: "#{@userKeyResolver}"

      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info,gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true

app:
  services:
    quantity:
      name: ${QUANTITY_SERVICE_NAME:quantity-service}
  gateway:
    retry:
      retries: ${GATEWAY_RETRY_RETRIES:2}
    ratelimit:
      auth:
        replenish-rate: ${GATEWAY_AUTH_RATE_PER_SEC:20}
        burst-capacity: ${GATEWAY_AUTH_BURST_CAPACITY:40}
      quantity:
        replenish-rate: ${GATEWAY_QUANTITY_RATE_PER_SEC:30}
        burst-capacity: ${GATEWAY_QUANTITY_BURST_CAPACITY:60}

resilience4j:
  circuitbreaker:
    instances:
      authCircuitBreaker:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 5
      quantityCircuitBreaker:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 5

logging:
  level:
    root: INFO

